<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="container">
        <div class="name">
            <h1>CALCULATOR</h1>
        </div>
        <div id="screen">
            <p id="screen-text">0</p>
        </div>
        <div class="buttons">
             <div class="numbers">
                <button>9</button>
                <button>8</button>
                <button>7</button>
                <button>6</button>
                <button>5</button>
                <button>4</button>
                <button>3</button>
                <button>2</button>
                <button>1</button>
                <button>0</button>
                <button id="dot">.</button>
                <button id="clear">c</button>
            </div>
            <div class="operators">
                <button id="plus-minus">+/-</button>
                <button id="add">+</button>
                <button id="minus">-</button>
                <button id="multiply">x</button>
                <button id="divide">&divide;</button>
                <button id="equal">=</button>
            </div>
        </div>
    </div>
</body>
</html>
